<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>root@stratcom — KALI 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { margin:0; background:#000; color:#00ff41; font-family:'VT323',monospace; height:100vh; overflow:hidden; }
        .header { background:#111; padding:12px 20px; display:flex; justify-content:space-between; border-bottom:3px solid #00ff41; }
        #terminal { height:calc(100vh - 60px); padding:20px; overflow-y:auto; font-size:1.5em; line-height:1.4; }
        .prompt { color:#00cc33; }
        .line { display:flex; margin-bottom:8px; }
        #input { background:transparent; border:none; color:#00ff41; font:inherit; outline:none; flex:1; }
        .success { color:#00ffaa; } .error { color:#ff5555; }
    </style>
</head>
<body>
    <div class="header">
        <div>root@stratcom — KALI LINUX 2026.2</div>
        <div>💼 $<span id="balance">2450</span> | <span onclick="withdraw()" style="cursor:pointer;color:#ffaa00">WITHDRAW</span></div>
    </div>
    <div id="terminal"></div>

    <script>
        let balance = 2450;
        const term = document.getElementById('terminal');
        const balEl = document.getElementById('balance');
        
        function print(text, cls='output') {
            const d = document.createElement('div');
            d.className = cls;
            d.textContent = text;
            term.appendChild(d);
            term.scrollTop = term.scrollHeight;
        }
        
        function updateBalance(amt) {
            balance += amt;
            balEl.textContent = balance;
        }
        
        function withdraw() {
            const amount = prompt("Enter withdrawal amount:");
            if (amount && !isNaN(amount) && amount > 0) {
                if (amount <= balance) {
                    print(`[+] Withdrawing $${amount} to wallet...`, "success");
                    setTimeout(() => {
                        balance -= parseInt(amount);
                        balEl.textContent = balance;
                        print(`[+] Withdrawal successful! New balance: $${balance}`, "success");
                    }, 1200);
                } else print("Insufficient funds", "error");
            }
        }
        
        function runSimulation(cmd) {
            print(`[+] Executing ${cmd}...`, "success");
            const steps = ["Scanning...", "Bypassing firewall...", "Injecting payload...", "Establishing connection..."];
            let i = 0;
            const interval = setInterval(() => {
                if (i < steps.length) {
                    print(steps[i]);
                    updateBalance(Math.floor(Math.random()*120)+50);
                    i++;
                } else {
                    clearInterval(interval);
                    print("[+] Operation completed successfully.", "success");
                }
            }, 700);
        }
        
        function execute(cmd) {
            print(`root@stratcom:~# ${cmd}`);
            const lower = cmd.toLowerCase().trim();
            
            if (lower === 'help') {
                print("nmap, hydra, msfconsole, gobuster, exploit, withdraw, balance, clear", "success");
            } else if (lower.includes('nmap')) {
                print("PORT   STATE  SERVICE", "success");
                print("22/tcp  open   ssh");
                print("80/tcp  open   http");
            } else if (lower.includes('hydra')) {
                runSimulation("Hydra Brute Force");
            } else if (lower.includes('msfconsole') || lower.includes('exploit')) {
                runSimulation("Metasploit Exploit");
            } else if (lower.includes('gobuster')) {
                print("[+] Directory brute force complete", "success");
                print("/admin, /login, /dashboard");
            } else if (lower === 'balance') {
                print(`Current balance: $${balance}`);
            } else if (lower === 'clear') {
                term.innerHTML = '';
            } else {
                print("Command executed. Use 'help' for full list.", "output");
            }
        }
        
        // Start
        print("KALI LINUX 2026.2 | TUNNEL ACTIVE", "success");
        print("Type 'help' to begin operations.");
        print("");
        
        function addPrompt() {
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = `<span class="prompt">root@stratcom:~# </span><input id="input" autofocus>`;
            term.appendChild(line);
            const input = line.querySelector('#input');
            input.focus();
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') {
                    const val = input.value.trim();
                    if (val) execute(val);
                    input.value = '';
                    addPrompt();
                }
            });
        }
        addPrompt();
    </script>
</body>
</html>
