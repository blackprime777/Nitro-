<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>root@stratcom — KALI 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { margin:0; background:#000; color:#00ff41; font-family:'VT323',monospace; height:100vh; overflow:hidden; }
        .header { background:#111; padding:12px 20px; display:flex; justify-content:space-between; border-bottom:3px solid #00ff41; font-size:1.4em; }
        #terminal { height:calc(100vh - 60px); padding:20px; overflow-y:auto; font-size:1.45em; line-height:1.45; scrollbar-color:#00ff41 #222; }
        .line { display:flex; margin-bottom:8px; }
        .prompt { color:#00cc33; margin-right:10px; }
        #input { background:transparent; border:none; color:#00ff41; font:inherit; outline:none; flex:1; }
        .success { color:#00ffaa; } .error { color:#ff6666; }
        button { background:#00ff41; color:#000; border:none; padding:8px 16px; font:inherit; cursor:pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div>root@stratcom — KALI LINUX 2026.2</div>
        <div>💼 $<span id="balance">2450</span> <button onclick="withdraw()">WITHDRAW</button></div>
    </div>
    <div id="terminal"></div>

    <script>
        let balance = 2450;
        const term = document.getElementById('terminal');
        const balEl = document.getElementById('balance');
        
        function print(text, cls = '') {
            const div = document.createElement('div');
            if (cls) div.className = cls;
            div.textContent = text;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }
        
        function updateBalance(gain) {
            balance += gain;
            balEl.textContent = balance;
        }
        
        function withdraw() {
            const amt = prompt("Enter amount to withdraw:");
            if (amt && parseInt(amt) > 0 && parseInt(amt) <= balance) {
                balance -= parseInt(amt);
                balEl.textContent = balance;
                print(`[+] $${amt} successfully withdrawn`, "success");
            } else {
                print("Invalid amount or insufficient funds", "error");
            }
        }
        
        function longExploit() {
            print("[+] Launching 50-Stage Advanced Exploit...", "success");
            const stages = Array.from({length: 50}, (_, i) => `[+] Stage ${i+1}/50: ${['Recon', 'Enumeration', 'Scanning', 'Exploitation', 'Persistence', 'Exfiltration'][Math.floor(Math.random()*6)]}...`);
            
            let i = 0;
            const interval = setInterval(() => {
                if (i < stages.length) {
                    print(stages[i]);
                    if (i % 4 === 0) updateBalance(Math.floor(Math.random() * 180) + 70);
                    i++;
                } else {
                    clearInterval(interval);
                    print("✅ 50 STAGES COMPLETE - FULL SYSTEM COMPROMISE", "success");
                }
            }, 2800);
        }
        
        function execute(cmd) {
            print(`root@stratcom:~# ${cmd}`);
            const lower = cmd.toLowerCase().trim();
            
            if (lower === 'help') print("help, exploit, 1, withdraw, balance, clear", "success");
            else if (lower === 'exploit' || lower === '1') longExploit();
            else if (lower === 'withdraw') withdraw();
            else if (lower === 'balance') print(`Current balance: $${balance}`);
            else if (lower === 'clear') term.innerHTML = '';
            else print("Command received", "output");
        }
        
        print("=== KALI LINUX 2026.2 ===", "success");
        print("Type 'exploit' or '1' for 50-stage payload");
        print("");
        
        function addInput() {
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = `<span class="prompt">root@stratcom:~# </span><input id="input" autofocus>`;
            term.appendChild(line);
            const input = line.querySelector('#input');
            input.focus();
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') {
                    const val = input.value.trim();
                    if (val) execute(val);
                    input.value = '';
                    addInput();
                }
            });
        }
        addInput();
    </script>
</body>
</html>
