<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>root@stratcom — KALI 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { margin:0; background:#000; color:#00ff41; font-family:'VT323',monospace; height:100vh; overflow:hidden; }
        .header { background:#111; padding:12px 20px; display:flex; justify-content:space-between; border-bottom:3px solid #00ff41; font-size:1.35em; }
        #terminal { height:calc(100vh - 60px); padding:20px; overflow-y:auto; font-size:1.45em; line-height:1.45; scrollbar-color:#00ff41 #222; }
        .line { display:flex; margin-bottom:8px; }
        .prompt { color:#00cc33; margin-right:10px; white-space:pre; }
        #input { background:transparent; border:none; color:#00ff41; font:inherit; outline:none; flex:1; }
        .success { color:#00ffaa; } .error { color:#ff6666; }
    </style>
</head>
<body>
    <div class="header">
        <div>root@stratcom — KALI LINUX 2026.2</div>
        <div>💼 $<span id="balance">2450</span></div>
    </div>
    <div id="terminal"></div>

    <script>
        let balance = 2450;
        const term = document.getElementById('terminal');
        const balEl = document.getElementById('balance');
        
        function print(text, cls = '') {
            const div = document.createElement('div');
            if (cls) div.className = cls;
            div.textContent = text;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }
        
        function updateBalance(gain) {
            balance += gain;
            balEl.textContent = balance;
        }
        
        function longExploit() {
            print("[+] Initializing Advanced Exploit Chain...", "success");
            const steps = [
                "[+] OSINT Phase - Harvesting data",
                "[+] Passive Recon - DNS & Subdomains",
                "[+] Active Scanning - Nmap fingerprint",
                "[+] Vulnerability Analysis - 38 vectors",
                "[+] CVE Matching & Exploit Generation",
                "[+] Bypassing WAF & IDS",
                "[+] Privilege Escalation",
                "[+] Lateral Movement",
                "[+] Payload Delivery",
                "[+] Root Access Gained",
                "[+] Exfiltrating Data",
                "[+] Wallet Injection Vector",
                "[+] Cleaning Logs"
            ];
            
            let i = 0;
            const interval = setInterval(() => {
                if (i < steps.length) {
                    print(steps[i]);
                    if (Math.random() > 0.4) updateBalance(Math.floor(Math.random() * 220) + 90);
                    i++;
                } else {
                    clearInterval(interval);
                    print("[+] FULL OPERATION COMPLETE - Target Owned", "success");
                }
            }, 8500); // ~2 minutes total
        }
        
        function execute(cmd) {
            print(`root@stratcom:~# ${cmd}`);
            const lower = cmd.toLowerCase().trim();
            
            if (lower === 'help') {
                print("nmap, hydra, msfconsole, exploit, 1, withdraw, balance, clear", "success");
            } else if (lower.includes('nmap')) {
                print("22/tcp open ssh\n80/tcp open http\n443/tcp open https", "success");
            } else if (lower.includes('hydra')) {
                print("[+] Hydra running... Password cracked: admin2026!", "success");
            } else if (lower.includes('msfconsole')) {
                print("[+] Meterpreter session opened", "success");
            } else if (lower === 'exploit' || lower === '1') {
                longExploit();
            } else if (lower === 'withdraw') {
                const amt = prompt("Enter amount to withdraw:");
                if (amt && parseInt(amt) <= balance) {
                    balance -= parseInt(amt);
                    balEl.textContent = balance;
                    print(`[+] $${amt} withdrawn successfully`, "success");
                }
            } else if (lower === 'balance') {
                print(`Current: $${balance}`);
            } else if (lower === 'clear') {
                term.innerHTML = '';
            } else {
                print("Command executed.", "output");
            }
        }
        
        // Init
        print("=== STRATCOM KALI TERMINAL ===", "success");
        print("Type 'help' for commands");
        print("");
        
        function addInput() {
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = `<span class="prompt">root@stratcom:~# </span><input id="input" autofocus>`;
            term.appendChild(line);
            const input = line.querySelector('#input');
            input.focus();
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') {
                    const val = input.value.trim();
                    if (val) execute(val);
                    input.value = '';
                    addInput();
                }
            });
        }
        addInput();
    </script>
</body>
</html>
