<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>root@stratcom — KALI 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { margin:0; background:#000; color:#00ff41; font-family:'VT323',monospace; height:100vh; overflow:hidden; }
        .header { background:#111; padding:12px 20px; display:flex; justify-content:space-between; border-bottom:3px solid #00ff41; }
        #terminal { height:calc(100vh - 60px); padding:20px; overflow-y:auto; font-size:1.4em; line-height:1.4; }
        .line { display:flex; margin-bottom:6px; }
        .prompt { color:#00cc33; margin-right:10px; }
        #input { background:transparent; border:none; color:#00ff41; font:inherit; outline:none; flex:1; }
        .success { color:#00ffaa; }
    </style>
</head>
<body>
    <div class="header">
        <div>root@stratcom — KALI LINUX 2026.2</div>
        <div>💼 $<span id="balance">2450</span></div>
    </div>
    <div id="terminal"></div>

    <script>
        let balance = 2450;
        const term = document.getElementById('terminal');
        const balEl = document.getElementById('balance');
        
        function print(text, cls = '') {
            const div = document.createElement('div');
            if (cls) div.className = cls;
            div.textContent = text;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }
        
        function updateBalance() {
            const gain = Math.floor(Math.random() * 140) + 60;
            balance += gain;
            balEl.textContent = balance;
        }
        
        function longExploit() {
            print("[+] Starting FULL EXPLOIT CHAIN (50 stages)...", "success");
            
            const stages = [];
            for (let i = 1; i <= 50; i++) {
                stages.push(`[+] Stage ${i}/50: ${['Recon', 'Scanning', 'Bypass', 'Injection', 'Escalation'][Math.floor(Math.random()*5)]} in progress...`);
            }
            
            let i = 0;
            const interval = setInterval(() => {
                if (i < stages.length) {
                    print(stages[i]);
                    if (i % 3 === 0) updateBalance();
                    i++;
                } else {
                    clearInterval(interval);
                    print("✅ ALL 50 STAGES COMPLETE - FULL COMPROMISE ACHIEVED", "success");
                }
            }, 2400); // Adjust speed if needed
        }
        
        function execute(cmd) {
            print(`root@stratcom:~# ${cmd}`);
            const lower = cmd.toLowerCase().trim();
            
            if (lower === 'help') print("help, exploit, 1, nmap, hydra, balance, clear", "success");
            else if (lower === 'exploit' || lower === '1') longExploit();
            else if (lower === 'balance') print(`Balance: $${balance}`);
            else if (lower === 'clear') term.innerHTML = '';
            else print("Command executed.", "output");
        }
        
        print("KALI LINUX 2026.2 - ADVANCED TUNNEL", "success");
        print("Type 'exploit' or '1' for 50-stage payload");
        print("");
        
        function addInput() {
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = `<span class="prompt">root@stratcom:~# </span><input id="input" autofocus>`;
            term.appendChild(line);
            const input = line.querySelector('#input');
            input.focus();
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') {
                    const val = input.value.trim();
                    if (val) execute(val);
                    input.value = '';
                    addInput();
                }
            });
        }
        addInput();
    </script>
</body>
</html>
